name: Supabase Migrations

on:
  pull_request:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Migration Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate filename format and ordering
        run: |
          set -euo pipefail

          mapfile -t files < <(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No migration files found in supabase/migrations"
            exit 1
          fi

          prev=""
          for file in "${files[@]}"; do
            base="$(basename "$file")"
            if [[ ! "$base" =~ ^[0-9]{14}_[a-z0-9_]+\.sql$ ]]; then
              echo "Invalid migration filename: $base"
              echo "Expected: YYYYMMDDHHMMSS_description.sql"
              exit 1
            fi

            prefix="${base:0:14}"
            if [ -n "$prev" ] && [[ "$prefix" < "$prev" ]]; then
              echo "Migration ordering error: $base appears out of order"
              exit 1
            fi
            prev="$prefix"
          done

          dupes="$(printf '%s\n' "${files[@]}" | xargs -n1 basename | cut -d'_' -f1 | sort | uniq -d || true)"
          if [ -n "$dupes" ]; then
            echo "Duplicate migration version prefix found:"
            echo "$dupes"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Supabase CLI is available
        run: |
          set -euo pipefail
          supabase --version

  migrate:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "${SUPABASE_ACCESS_TOKEN}" ] || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          [ -n "${SUPABASE_PROJECT_REF}" ] || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)
          [ -n "${SUPABASE_DB_PASSWORD}" ] || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase db push --linked --yes

      - name: Trigger Vercel redeploy (optional)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "${VERCEL_DEPLOY_HOOK_URL}"
